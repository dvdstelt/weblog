#-------------------------------
# General Site Settings
title: BloggingAbout.NET
logo: # You can add own logo. For example '/images/logo.png'.
description: Dennis van der Stelt on building distributed systems
baseurl: "" # The subpath of your site, e.g. /blog
url: "http://bloggingabout.net/" # The base hostname & protocol for your site, e.g. http://example.com


#-------------------------------
# Author Settings
author:
  name: Dennis van der Stelt
  avatar: '/images/dennis.jpg'


#-------------------------------
# Hero Settings
hero:
  title: Dennis van der Stelt
  description: I'm a developer, international speaker and coach/trainer. I love to discuss code, software architecture and distributed systems, messaging, star wars and lego with anyone who wants to listen or speak. <br /> I currently work at Particular Software on NServiceBus.
  image: '/images/hero.jpg'


#-------------------------------
# Contact Settings
contact:
  email: dvdstelt@gmail.com # Add your email for contant form
  description: The Force is strong with this one. I have you now. I find your lack of faith disturbing. Hey, Luke! May the Force be with you. She must have hidden the plans in the escape pod. Send a detachment down to retrieve them, and see to it personally, Commander. There’ll be no one to stop us this time! # Add a description of your form

# NOTE
# Aditu theme comes with a contact form built-in. You can use this form with Formspree service and get up to 50 submissions for free. Also, you can easily switch to another service if you want.


#-------------------------------
# Footer section
# Example of adding a new link to the footer - {icon: "ion-logo-github", link: "https://github.com"}
# Other icons can be found at https://ionicons.com
social:
- {icon: "ion-logo-twitter", link: "https://twitter.com/dvdstelt"}
- {icon: "ion-logo-github", link: "https://github.com/dvdstelt"}
- {icon: "ion-logo-linkedin", link: "https://www.linkedin.com/in/dvdstelt/"}
- {icon: "ion-logo-whatsapp", link: "https://api.whatsapp.com/send?phone=%2B31648536810"}

#-------------------------------
# Comment Section (Disqus)
disqus-identifier: bloggingabout-net # Add your shortname for Disqus Comment. For example mr-brown


#-------------------------------
# Google Analytics
google-analytics: G-KYNPK4927H # Add your identifier. For example UA-99631805-1.


#-------------------------------
# Newsletter
mailchimp: false # To enable the mailchimp form, use the value true. To turn off use the value false.
mailchimp-identifier: # Add your MailChimp form identifier. For example - blogenjoyfreedom.us16.list-manage.com/subscribe/post?u=cd56155d76ddeeb4c0bc4d080&amp;id=7a526cd13e


#-------------------------------
# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll/tagging
#  - jekyll-redirect-from
#  - jekyll-feed

kramdown:
  input: GFM
  hard_wrap: false

paginate: 9
paginate_path: "/page/:num"

# Pages Path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext

include:
  - _pages

exclude:
  - _exclude

# Tags
tag_page_dir:         tag
tag_page_layout:      tag_page
tag_permalink_style:  pretty

sass:
  sass_dir: _sass
  style: compressed